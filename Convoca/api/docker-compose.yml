services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: convoca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: convoca
      POSTGRES_PASSWORD: convoca_dev
      POSTGRES_DB: convoca_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convoca -d convoca_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    image: evoapicloud/evolution-api:v2.2.3
    container_name: convoca_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: convoca_evo_dev_key
      # DATABASE_ENABLED=false não dispensa o script de deploy interno da imagem:
      # ele exige DATABASE_PROVIDER + DATABASE_URL válidos mesmo sem persistência de
      # instâncias/mensagens habilitada. Aponta pro Postgres já existente no compose,
      # em banco próprio (evolution_dev) pra não misturar com convoca_dev.
      DATABASE_ENABLED: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://convoca:convoca_dev@postgres:5432/evolution_dev?schema=public
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      LOG_LEVEL: ERROR
      DEL_INSTANCE: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  evolution_data:
