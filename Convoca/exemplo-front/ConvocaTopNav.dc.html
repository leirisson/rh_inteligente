<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; align-items:center; justify-content:space-between; height:64px; padding:0 28px; background:#ffffff; border-bottom:1px solid #E2E8F0; font-family:'Plus Jakarta Sans', system-ui, sans-serif;">
  <div style="display:flex; align-items:center; gap:40px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:30px; height:30px; border-radius:9px; background:#4F46E5; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px; box-shadow:0 2px 6px rgba(79,70,229,.35);">C</div>
      <span style="font-weight:800; font-size:18px; letter-spacing:-.02em; color:#0F172A;">Convoca</span>
    </div>
    <nav style="display:flex; align-items:center; gap:6px;">
      <sc-for list="{{ items }}" as="it" hint-placeholder-count="4">
        <div style="position:relative; padding:6px 12px; font-size:14px; color:{{ it.color }}; font-weight:{{ it.weight }}; cursor:pointer;">
          {{ it.label }}
          <div style="position:absolute; left:12px; right:12px; bottom:-21px; height:2px; border-radius:2px; background:{{ it.bar }};"></div>
        </div>
      </sc-for>
    </nav>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <div style="width:34px; height:34px; border-radius:50%; background:#EEF2FF; color:#4F46E5; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">RA</div>
    <div style="display:flex; flex-direction:column; line-height:1.2;">
      <span style="font-size:13px; font-weight:600; color:#0F172A;">Rafael Alves</span>
      <span style="font-size:11px; color:#94A3B8;">Admin · Nexo Tech</span>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:64},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;vagas&quot;,&quot;candidatos&quot;,&quot;entrevistas&quot;,&quot;config&quot;],&quot;default&quot;:&quot;vagas&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'vagas';
    const base = [
      { id: 'vagas', label: 'Vagas' },
      { id: 'candidatos', label: 'Candidatos' },
      { id: 'entrevistas', label: 'Entrevistas' },
      { id: 'config', label: 'Configurações' },
    ];
    const items = base.map(it => ({
      label: it.label,
      color: it.id === active ? '#4F46E5' : '#64748B',
      weight: it.id === active ? '700' : '500',
      bar: it.id === active ? '#4F46E5' : 'transparent',
    }));
    return { items };
  }
}
</script>
</body>
</html>
